controller_node:
  ros__parameters:
    use_sim_time: true
    controller_types: [mppi]
    mppi:
      plugin: easynav_mppi_controller/MPPIController
      num_samples: 100
      horizon_steps: 10	
      dt:	0.1	
      lambda:	0.1	
      max_linear_velocity:	1.0	
      max_angular_velocity:	1.0	
      max_linear_acceleration:	0.5	
      max_angular_acceleration:	1.0	
      fov:	1.57	
      safety_radius:	0.6	

localizer_node:
  ros__parameters:
    use_sim_time: true
    localizer_types: [amcl]
    amcl:
      rt_freq: 10.0
      freq: 2.0
      reseed_freq: 0.1
      plugin: easynav_navmap_localizer/AMCLLocalizer
      num_particles: 100
      noise_translation: 0.1
      noise_rotation: 0.03
      noise_translation_to_rotation: 0.02
      min_noise_xy: 0.2
      min_noise_yaw: 0.1
      initial_pose:
        x: 0.0
        y: 0.0
        yaw: 0.0
        std_dev_xy: 0.05
        std_dev_yaw: 0.01

maps_manager_node:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5
    map_types: [bonxai, navmap]
    bonxai:
      freq: 10.0 
      plugin: easynav_bonxai_maps_manager/BonxaiMapsManager
      package: urjc_trains_world
      bonxai_path_file: maps/map.pcd
    navmap:
      freq: 10.0 
      plugin: easynav_navmap_maps_manager/NavMapMapsManager
      package: urjc_trains_world
      navmap_path_file: maps/map.navmap

planner_node:
  ros__parameters:
    use_sim_time: true
    planner_types: [astar]
    astar:
      plugin: easynav_navmap_planner/AStarPlanner
      max_allowed_slope_deg: 20.0

sensors_node:
  ros__parameters:
    transform_timeout: 0.5
    use_sim_time: true
    forget_time: 0.5
    transform_tolerance: 0.5
    sensors: [laser, imu]
    perception_default_frame: odom
    laser:
      topic: /scan
      type: sensor_msgs/msg/LaserScan
    imu:
      topic: /imu/data
      type: sensor_msgs/msg/Imu

system_node:
  ros__parameters:
    use_sim_time: true
    tf_buffer_duration: 10.0
    use_real_time: false
    position_tolerance: 1.0
    angle_tolerance: 0.25
